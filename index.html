Hier ist der **komplette Code** mit dem geänderten CSS-Block: Die **Plus- und Minus-Bedienfelder** sitzen jetzt **direkt über und unter der kleinen Auszeit-Anzeige**.

```html
<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>Eieruhr – Arbeitszeit & Auszeit</title>

  <style>
    :root{
      color-scheme: light dark;

    .startBtn{

    /* Rechte Seite: Auszeit-Karte */
    .sideCard{

      display:grid;

      /* Plus, Auszeit-Anzeige und Minus direkt untereinander */

    .clockCard{
      width:180px;

      width:150px;

  </style>
</head>

<body>
  <div class="layout" aria-label="Timer Oberfläche">

    <div class="dialCard">
      <div class="dialWrap">
        <svg id="dial" class="dial" viewBox="0 0 220 220" role="img" aria-label="Eieruhr mit 119-Minuten-Skala">

          <circle cx="110" cy="110" r="104" fill="currentColor" opacity="0.06"/>
          <circle cx="110" cy="110" r="100" fill="#fff" stroke="currentColor" stroke-width="3"/>
          <g id="ticks"></g>

          <path id="arcGreen" fill="var(--green)" opacity="0.92"/>
          <path id="arcRed" fill="var(--red)" opacity="0.92"/>

          <circle id="innerFill" cx="110" cy="110" r="72" fill="transparent" opacity="0.92"/>

          <path id="arcRed2" fill="var(--red2)" opacity="0.95"/>

          <text id="centerLabel" x="110" y="98" text-anchor="middle"
                style="font: 800 18px/1.1 ui-sans-serif, system-ui, -apple-system, Segoe UI; fill: #fff;">
            ARBEITSZEIT
          </text>

          <text id="centerMin" x="100" y="126" text-anchor="end"
                style="font: 800 30px/1 ui-monospace, SFMono-Regular, Menlo, monospace; fill: #fff; letter-spacing:0.5px;">
            00
          </text>

          <text id="centerColon" x="110" y="126" text-anchor="middle"
                style="font: 800 30px/1 ui-monospace, SFMono-Regular, Menlo, monospace; fill: #fff;">
            :
          </text>

          <text id="centerSec" x="120" y="126" text-anchor="start"
                style="font: 800 30px/1 ui-monospace, SFMono-Regular, Menlo, monospace; fill: #fff; letter-spacing:0.5px;">
            00
          </text>

          <circle id="handleBoundary" r="10" fill="var(--black)" stroke="#fff" stroke-width="3" style="display:none" />
          <circle id="handleTotal" r="10" fill="var(--blue)" stroke="#fff" stroke-width="3" style="display:none" />

          <circle cx="110" cy="110" r="72" fill="transparent" stroke="currentColor" stroke-width="2"/>
        </svg>
      </div>

      <div class="btnRow">
        <button id="startBtn" class="startBtn" aria-label="Start/Pause">Start</button>
        <button id="resetBtn" class="startBtn ghost" aria-label="Zurücksetzen auf 30/7">Reset</button>
      </div>
    </div>

    <div class="sideCard" aria-label="Auszeit einstellen">
      <button id="breakPlus" class="bigStep" aria-label="Auszeit plus 1 Minute">+</button>

      <div class="clockCard" aria-live="polite" title="Auszeit grün">
        <svg class="clockFace" viewBox="0 0 100 100" aria-hidden="true">
          <circle cx="50" cy="50" r="45" stroke="#000" stroke-width="3" fill="none"/>

          <g stroke="#000" stroke-width="2.5" opacity="0.9">
            <line x1="50" y1="8" x2="50" y2="16"/>
            <line x1="50" y1="84" x2="50" y2="92"/>
            <line x1="8" y1="50" x2="16" y2="50"/>
            <line x1="84" y1="50" x2="92" y2="50"/>
          </g>

          <g stroke="#000" stroke-width="1.6" opacity="0.7">
            <line x1="23" y1="23" x2="28" y2="28"/>
            <line x1="72" y1="72" x2="77" y2="77"/>
            <line x1="23" y1="77" x2="28" y2="72"/>
            <line x1="72" y1="28" x2="77" y2="23"/>
          </g>
        </svg>

        <div id="breakBig" class="clockNum">10</div>
      </div>

      <button id="breakMinus" class="bigStep" aria-label="Auszeit minus 1 Minute">−</button>
    </div>
  </div>

  <script>
    const dial = document.getElementById('dial');
    const ticksG = document.getElementById('ticks');

    const arcGreen = document.getElementById('arcGreen');
    const arcRed = document.getElementById('arcRed');
    const arcRed2 = document.getElementById('arcRed2');

    const innerFill = document.getElementById('innerFill');

    const handleBoundary = document.getElementById('handleBoundary');
    const handleTotal = document.getElementById('handleTotal');

    const centerLabel = document.getElementById('centerLabel');
    const centerMin = document.getElementById('centerMin');
    const centerColon = document.getElementById('centerColon');
    const centerSec = document.getElementById('centerSec');

    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    const breakPlus = document.getElementById('breakPlus');
    const breakMinus = document.getElementById('breakMinus');
    const breakBig = document.getElementById('breakBig');

    const MAX_TOTAL_MIN = 119;

    let initialBreak = 10;
    let initialTotal = 45;

    try{
      const saved = JSON.parse(localStorage.getItem('ttHandles') || '{}');

      if(Number.isFinite(saved.breakMin)){
        initialBreak = saved.breakMin;
      }

      if(Number.isFinite(saved.totalMin)){
        initialTotal = Math.min(MAX_TOTAL_MIN, Math.max(1, saved.totalMin));
      }
    }catch{}

    function save(){
      localStorage.setItem('ttHandles', JSON.stringify({
        breakMin: Math.floor(state.breakSec / 60),
        totalMin: Math.floor(state.totalSec / 60)
      }));
    }

    const state = {
      totalSec: Math.min(MAX_TOTAL_MIN, Math.max(1, initialTotal)) * 60,
      breakSec: 0,
      workSec: 0,
      started:false,
      running:false,
      t0:0,
      pausedAcc:0,
      pauseStart:0,
      lastPhase:'work'
    };

    state.breakSec = Math.min(initialBreak * 60, state.totalSec, 60 * 60);
    state.workSec = state.totalSec - state.breakSec;

    breakBig.textContent = Math.floor(state.breakSec / 60);

    (function drawTicks(){
      const cx = 110;
      const cy = 110;
      const rOuter = 100;
      const long = 12;
      const short = 6;

      for(let i = 0; i < 60; i++){
        const angle = i * 6;
        const rad = (angle - 90) * Math.PI / 180;
        const len = (i % 5 === 0) ? long : short;

        const x1 = cx + (rOuter - len) * Math.cos(rad);
        const y1 = cy + (rOuter - len) * Math.sin(rad);
        const x2 = cx + rOuter * Math.cos(rad);
        const y2 = cy + rOuter * Math.sin(rad);

        const line = document.createElementNS('http://www.w3.org/2000/svg','line');

        line.setAttribute('x1', x1.toFixed(2));
        line.setAttribute('y1', y1.toFixed(2));
        line.setAttribute('x2', x2.toFixed(2));
        line.setAttribute('y2', y2.toFixed(2));
        line.setAttribute('stroke', 'currentColor');
        line.setAttribute('stroke-width', i % 5 === 0 ? '2' : '1');
        line.setAttribute('opacity', i % 5 === 0 ? '0.65' : '0.45');

        ticksG.appendChild(line);
      }
    })();

    const clamp = (n, min, max) => Math.max(min, Math.min(max, n));

    function polar(cx, cy, r, deg){
      const a = (deg - 90) * Math.PI / 180;

      return {
        x: cx + r * Math.cos(a),
        y: cy + r * Math.sin(a)
      };
    }

    function sectorPath(cx, cy, rO, rI, startDeg, endDeg){
      if(endDeg <= startDeg){
        return '';
      }

      if(endDeg - startDeg >= 360){
        endDeg = startDeg + 359.999;
      }

      const large = (endDeg - startDeg) > 180 ? 1 : 0;

      const p1 = polar(cx, cy, rO, startDeg);
      const p2 = polar(cx, cy, rO, endDeg);
      const p3 = polar(cx, cy, rI, endDeg);
      const p4 = polar(cx, cy, rI, startDeg);

      return `M ${p1.x} ${p1.y}
              A ${rO} ${rO} 0 ${large} 1 ${p2.x} ${p2.y}
              L ${p3.x} ${p3.y}
              A ${rI} ${rI} 0 ${large} 0 ${p4.x} ${p4.y}
              Z`;
    }

    function pointerInfo(e){
      e.preventDefault();

      const rect = dial.getBoundingClientRect();
      const scale = 220 / rect.width;

      const x = (e.clientX - (rect.left + rect.width / 2)) * scale;
      const y = (e.clientY - (rect.top + rect.height / 2)) * scale;

      let deg = (Math.atan2(y, x) * 180 / Math.PI) + 90;

      if(deg < 0){
        deg += 360;
      }

      return {
        deg,
        radius: Math.hypot(x, y),
        vx: 110 + x,
        vy: 110 + y
      };
    }

    function currentElapsed(){
      if(!state.started){
        return 0;
      }

      const now = Date.now();

      const paused = state.running
        ? state.pausedAcc
        : state.pausedAcc + (state.pauseStart ? (now - state.pauseStart) : 0);

      return clamp(
        Math.floor((now - state.t0 - paused) / 1000),
        0,
        state.totalSec
      );
    }

    function fmtMMSS(s){
      s = Math.max(0, Math.floor(s));

      const m = Math.floor(s / 60);
      const sec = s % 60;

      return [
        String(m).padStart(2, '0'),
        String(sec).padStart(2, '0')
      ];
    }

    function getPhase(elapsed){
      if(elapsed < state.workSec){
        return 'work';
      }

      if(elapsed < state.totalSec){
        return 'break';
      }

      return 'done';
    }

    let audioCtx = null;

    function getAudioCtx(){
      const AC = window.AudioContext || window.webkitAudioContext;

      if(!AC){
        return null;
      }

      if(!audioCtx){
        audioCtx = new AC();
      }

      if(audioCtx.state === 'suspended'){
        audioCtx.resume();
      }

      return audioCtx;
    }

    function playChime(phase){
      const ctx = getAudioCtx();

      if(!ctx){
        return;
      }

      const t = ctx.currentTime;

      const tone = (freq, start, dur = 0.2, type = 'sine', gain = 0.28) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();

        o.type = type;
        o.frequency.setValueAtTime(freq, t + start);

        o.connect(g).connect(ctx.destination);

        g.gain.setValueAtTime(0.0001, t + start);
        g.gain.linearRampToValueAtTime(gain, t + start + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t + start + dur);

        o.start(t + start);
        o.stop(t + start + dur + 0.03);
      };

      if(phase === 'break'){
        tone(660, 0, 0.18, 'sine', 0.26);
        tone(880, 0.12, 0.18, 'sine', 0.22);

        if('vibrate' in navigator){
          navigator.vibrate([120, 90, 120]);
        }

      }else if(phase === 'done'){
        tone(740, 0, 0.18, 'triangle', 0.3);
        tone(740, 0.25, 0.18, 'triangle', 0.3);
        tone(740, 0.5, 0.18, 'triangle', 0.3);

        if('vibrate' in navigator){
          navigator.vibrate([200, 100, 200, 100, 200]);
        }

      }else{
        tone(520, 0, 0.14, 'sine', 0.22);
        tone(440, 0.12, 0.16, 'sine', 0.20);

        if('vibrate' in navigator){
          navigator.vibrate(80);
        }
      }
    }

    function onPhaseChange(phase){
      playChime(phase);
    }

    function updateDial(elapsed){
      const remRedSec = Math.max(0, state.workSec - elapsed);
      const remGreenSec = Math.max(0, state.totalSec - Math.max(elapsed, state.workSec));

      const degGreen = Math.min(360, (remGreenSec / 3600) * 360);
      const redDegTotal = (remRedSec / 3600) * 360;

      const outerRedCapacity = Math.max(0, 360 - degGreen);
      const degRedOuter = Math.min(redDegTotal, outerRedCapacity);

      const degRedInner = Math.min(
        Math.max(0, redDegTotal - outerRedCapacity),
        354
      );

      const cx = 110;
      const cy = 110;

      const rO = 98;
      const rI = 74;

      const r2O = 70;
      const r2I = 62;

      arcGreen.setAttribute(
        'd',
        degGreen > 0 ? sectorPath(cx, cy, rO, rI, 0, degGreen) : ''
      );

      arcRed.setAttribute(
        'd',
        degRedOuter > 0 ? sectorPath(cx, cy, rO, rI, degGreen, degGreen + degRedOuter) : ''
      );

      arcRed2.setAttribute(
        'd',
        degRedInner > 0 ? sectorPath(cx, cy, r2O, r2I, 0, degRedInner) : ''
      );

      if(remRedSec > 0){
        innerFill.setAttribute(
          'fill',
          getComputedStyle(document.documentElement).getPropertyValue('--red') || '#ef4444'
        );

        centerLabel.textContent = 'ARBEITSZEIT';

        const [mm, ss] = fmtMMSS(remRedSec);

        centerMin.textContent = mm;
        centerSec.textContent = ss;

        centerMin.setAttribute('fill', '#fff');
        centerSec.setAttribute('fill', '#fff');
        centerColon.setAttribute('fill', '#fff');

      }else if(remGreenSec > 0){
        innerFill.setAttribute(
          'fill',
          getComputedStyle(document.documentElement).getPropertyValue('--green') || '#16a34a'
        );

        centerLabel.textContent = 'AUSZEIT';

        const [mm, ss] = fmtMMSS(remGreenSec);

        centerMin.textContent = mm;
        centerSec.textContent = ss;

        centerMin.setAttribute('fill', '#fff');
        centerSec.setAttribute('fill', '#fff');
        centerColon.setAttribute('fill', '#fff');

      }else{
        innerFill.setAttribute('fill', 'transparent');

        centerLabel.textContent = 'FERTIG';
        centerMin.textContent = '00';
        centerSec.textContent = '00';

        centerMin.setAttribute('fill', 'var(--fg-soft)');
        centerSec.setAttribute('fill', 'var(--fg-soft)');
        centerColon.setAttribute('fill', 'var(--fg-soft)');
      }

      const showHandles = !state.running;

      handleBoundary.style.display = showHandles ? 'block' : 'none';
      handleTotal.style.display = showHandles ? 'block' : 'none';

      if(showHandles){
        const boundaryDeg = Math.min(360, (state.breakSec / 3600) * 360);
        const totalMin = state.totalSec / 60;

        const totalDeg = totalMin <= 60
          ? (totalMin / 60) * 360
          : ((totalMin - 60) / 60) * 360;

        const gripROuter = (rO + rI) / 2;
        const gripRInner = (r2O + r2I) / 2;

        const pB = polar(cx, cy, gripROuter, boundaryDeg);
        const pT = polar(cx, cy, totalMin <= 60 ? gripROuter : gripRInner, totalDeg);

        handleBoundary.setAttribute('cx', pB.x.toFixed(2));
        handleBoundary.setAttribute('cy', pB.y.toFixed(2));

        handleTotal.setAttribute('cx', pT.x.toFixed(2));
        handleTotal.setAttribute('cy', pT.y.toFixed(2));
      }
    }

    function updateUI(){
      const elapsed = currentElapsed();

      updateDial(elapsed);

      startBtn.textContent = state.running ? 'Pause' : 'Start';
      resetBtn.style.display = state.running ? 'none' : 'inline-block';
    }

    let ticker = null;

    function start(){
      if(!state.started){
        state.started = true;
        state.t0 = Date.now();
        state.pausedAcc = 0;

        state.lastPhase = state.workSec > 0
          ? 'work'
          : (state.totalSec > 0 ? 'break' : 'done');

      }else if(!state.running){
        if(state.pauseStart){
          state.pausedAcc += Date.now() - state.pauseStart;
          state.pauseStart = 0;
        }
      }

      if(!state.running){
        state.running = true;

        if(ticker){
          clearInterval(ticker);
        }

        ticker = setInterval(tick, 200);
      }

      updateUI();
    }

    function pause(){
      if(!state.running){
        return;
      }

      state.running = false;
      state.pauseStart = Date.now();

      if(ticker){
        clearInterval(ticker);
      }

      ticker = null;

      updateUI();
    }

    function tick(){
      const elapsed = currentElapsed();
      const phase = getPhase(elapsed);

      if(phase !== state.lastPhase){
        state.lastPhase = phase;
        onPhaseChange(phase);
      }

      if(elapsed >= state.totalSec){
        updateUI();

        clearInterval(ticker);
        ticker = null;

        state.running = false;

        return;
      }

      updateUI();
    }

    function hardResetTo30_7(){
      if(ticker){
        clearInterval(ticker);
        ticker = null;
      }

      state.started = false;
      state.running = false;
      state.t0 = 0;
      state.pausedAcc = 0;
      state.pauseStart = 0;

      state.totalSec = 30 * 60;
      state.breakSec = 7 * 60;
      state.workSec = state.totalSec - state.breakSec;

      state.lastPhase = 'work';

      breakBig.textContent = Math.floor(state.breakSec / 60);

      updateUI();
      save();
    }

    let dragging = false;
    let dragMode = null;

    function getHandlePositions(){
      const cx = 110;
      const cy = 110;

      const gripROuter = 86;
      const gripRInner = 66;

      const boundaryDeg = Math.min(360, (state.breakSec / 3600) * 360);
      const totalMin = state.totalSec / 60;

      const totalDeg = totalMin <= 60
        ? (totalMin / 60) * 360
        : ((totalMin - 60) / 60) * 360;

      return {
        boundary: polar(cx, cy, gripROuter, boundaryDeg),
        total: polar(cx, cy, totalMin <= 60 ? gripROuter : gripRInner, totalDeg)
      };
    }

    function nearestHandle(info){
      const pos = getHandlePositions();

      const dB = Math.hypot(info.vx - pos.boundary.x, info.vy - pos.boundary.y);
      const dT = Math.hypot(info.vx - pos.total.x, info.vy - pos.total.y);

      return dB <= dT ? 'boundary' : 'total';
    }

    function totalMinFromPointer(info){
      if(info.radius < 74){
        return clamp(60 + Math.round(info.deg / 6), 61, MAX_TOTAL_MIN);
      }

      let m = Math.round(info.deg / 6);

      if(m === 0 && info.deg > 300){
        m = 60;
      }

      if(m === 0){
        m = 1;
      }

      return clamp(m, 1, 60);
    }

    function applyDrag(info){
      if(dragMode === 'boundary'){
        const maxBoundaryDeg = Math.min(360, (state.totalSec / 3600) * 360);
        const d = clamp(info.deg, 0, maxBoundaryDeg);

        const maxBreakMin = Math.min(60, Math.floor(state.totalSec / 60));
        const breakMin = clamp(Math.round(d / 6), 0, maxBreakMin);

        state.breakSec = breakMin * 60;
        state.workSec = state.totalSec - state.breakSec;

      }else{
        const tMin = totalMinFromPointer(info);
        const keepGreen = state.breakSec;

        state.totalSec = tMin * 60;
        state.breakSec = Math.min(keepGreen, state.totalSec, 60 * 60);
        state.workSec = state.totalSec - state.breakSec;
      }

      breakBig.textContent = Math.floor(state.breakSec / 60);

      updateUI();
    }

    dial.addEventListener('pointerdown', (e) => {
      if(state.running){
        return;
      }

      e.preventDefault();

      const info = pointerInfo(e);

      dragMode = nearestHandle(info);
      dragging = true;

      dial.setPointerCapture?.(e.pointerId);

      applyDrag(info);
    }, {passive:false});

    dial.addEventListener('pointermove', (e) => {
      if(!dragging || state.running){
        return;
      }

      e.preventDefault();

      const info = pointerInfo(e);

      applyDrag(info);
    }, {passive:false});

    function endDrag(e){
      if(!dragging){
        return;
      }

      dragging = false;
      dragMode = null;

      dial.releasePointerCapture?.(e.pointerId);

      save();
    }

    dial.addEventListener('pointerup', endDrag);
    dial.addEventListener('pointercancel', endDrag);

    window.addEventListener('blur', () => {
      dragging = false;
      dragMode = null;
    });

    function stepBreak(delta){
      const maxBreakMin = Math.min(60, Math.floor(state.totalSec / 60));
      const v = clamp(Math.floor(state.breakSec / 60) + delta, 0, maxBreakMin);

      state.breakSec = v * 60;
      state.workSec = state.totalSec - state.breakSec;

      breakBig.textContent = v;

      updateUI();
      save();
    }

    function addRepeater(btn, fn){
      let h = null;
      let r = null;

      const down = (e) => {
        e.preventDefault();

        fn();

        h = setTimeout(() => {
          r = setInterval(fn, 120);
        }, 400);
      };

      const up = () => {
        clearTimeout(h);
        clearInterval(r);

        h = null;
        r = null;
      };

      btn.addEventListener('pointerdown', down, {passive:false});
      window.addEventListener('pointerup', up);
      window.addEventListener('pointercancel', up);
      window.addEventListener('blur', up);
    }

    addRepeater(breakPlus, () => stepBreak(+1));
    addRepeater(breakMinus, () => stepBreak(-1));

    startBtn.addEventListener('click', () => {
      state.running ? pause() : start();
    });

    resetBtn.addEventListener('click', hardResetTo30_7);

    updateUI();
